name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  unit-and-smoke:
    name: Unit + Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"

      - name: Install runtime
        run: python -m pip install -U pip && python -m pip install -e .

      - name: Run unit tests
        run: PYTHONPATH=runtime python -m unittest discover -s runtime/tests -v

  windows-runtime-smoke:
    name: Windows Runtime Smoke
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"

      - name: Install runtime via PowerShell script
        shell: pwsh
        run: ./scripts/prumo_runtime_install.ps1

      - name: Update runtime via PowerShell script
        shell: pwsh
        run: ./scripts/prumo_runtime_update.ps1

      - name: Check runtime version on Windows
        shell: pwsh
        run: prumo --version

      - name: Validate setup runs non-interactive on Windows
        shell: pwsh
        env:
          PRUMO_NONINTERACTIVE: "1"
        run: |
          prumo setup `
            --workspace "$env:RUNNER_TEMP/prumo-validate" `
            --user-name CI `
            --workspace-name "CI Validate" `
            --agent-name Prumo `
            --timezone America/Sao_Paulo `
            --briefing-time 09:00

  wheel-install-smoke:
    name: Wheel Install Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"

      - name: Build wheel and sdist
        run: |
          python -m pip install -U pip build
          python -m build --outdir dist

      - name: Install wheel in clean venv
        run: |
          python -m venv /tmp/venv-wheel-test
          /tmp/venv-wheel-test/bin/pip install dist/prumo_runtime-*.whl

      - name: Run prumo setup from wheel install
        env:
          PRUMO_NONINTERACTIVE: "1"
        run: |
          mkdir -p /tmp/prumo-wheel-ws
          /tmp/venv-wheel-test/bin/prumo setup \
            --workspace /tmp/prumo-wheel-ws \
            --user-name CI \
            --workspace-name "CI Wheel" \
            --agent-name Prumo \
            --timezone America/Sao_Paulo \
            --briefing-time 09:00

      - name: Verify bundled skills materialized in workspace
        run: |
          test -f /tmp/prumo-wheel-ws/.prumo/skills/abrir/SKILL.md
          test -f /tmp/prumo-wheel-ws/.prumo/skills/briefing/SKILL.md
          test -f /tmp/prumo-wheel-ws/.prumo/skills/start/SKILL.md
          test -f /tmp/prumo-wheel-ws/.prumo/system/PRUMO-CORE.md
          grep -q "prumo_version: 5.2.0" /tmp/prumo-wheel-ws/.prumo/system/PRUMO-CORE.md
          echo "Wheel install carrega skills bundled corretamente"

      - name: Verify start --format json devolve canonical_refs apontando pro bundle
        run: |
          /tmp/venv-wheel-test/bin/prumo start \
            --workspace /tmp/prumo-wheel-ws \
            --format json > /tmp/start.json
          python -c "
          import json, sys
          d = json.load(open('/tmp/start.json'))
          refs = d.get('adapter_hints', {}).get('canonical_refs', {})
          assert refs, f'canonical_refs vazio em start: {d}'
          assert 'briefing_procedure' in refs, refs
          assert '_bundled' in refs['briefing_procedure'], refs['briefing_procedure']
          print(f'OK: canonical_refs.briefing_procedure = {refs[\"briefing_procedure\"]}')
          "

      - name: Verify briefing --format json devolve canonical_refs apontando pro bundle
        run: |
          /tmp/venv-wheel-test/bin/prumo briefing \
            --workspace /tmp/prumo-wheel-ws \
            --format json > /tmp/briefing.json
          python -c "
          import json, sys
          d = json.load(open('/tmp/briefing.json'))
          refs = d.get('canonical_refs', {})
          assert refs, f'canonical_refs vazio em briefing: keys={list(d.keys())}'
          assert 'briefing_procedure' in refs, refs
          assert '_bundled' in refs['briefing_procedure'], refs['briefing_procedure']
          print(f'OK: canonical_refs.briefing_procedure = {refs[\"briefing_procedure\"]}')
          "

      - name: Verify sdist roundtrip — wheel rebuilt from extracted sdist contains bundle
        run: |
          mkdir -p /tmp/sdist-roundtrip
          tar xzf dist/prumo_runtime-*.tar.gz -C /tmp/sdist-roundtrip
          cd /tmp/sdist-roundtrip/prumo_runtime-*
          python -m build --wheel --outdir /tmp/sdist-roundtrip/wheel
          unzip -l /tmp/sdist-roundtrip/wheel/*.whl | grep -q "_bundled/skills/abrir/SKILL.md"
          unzip -l /tmp/sdist-roundtrip/wheel/*.whl | grep -q "_bundled/plugin.json"
          unzip -l /tmp/sdist-roundtrip/wheel/*.whl | grep -q "_bundled/VERSION"
          echo "sdist contém os assets necessários para reconstruir o wheel"
