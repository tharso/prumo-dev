name: Zombie Issue Detector
on:
  schedule:
    - cron: '0 10 * * 1'  # toda segunda às 10h UTC
  workflow_dispatch: {}

jobs:
  detect-zombies:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const DONE_PATTERNS = [
              /^(implementa[cç][aã]o|execu[cç][aã]o|fase \d+)\s+(conclu[ií]da|completa)/im,
              /\bissue (pode|deve) ser fechada\b/i,
              /\bfechando issue\b/i,
              /\bclosing issue\b/i,
              /\baprovado\b.*\bfechando\b/i,
            ];

            const SEVEN_DAYS_MS = 7 * 24 * 60 * 60 * 1000;
            const now = new Date();

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              sort: 'updated',
              direction: 'desc',
              per_page: 100,
            });

            for (const issue of issues) {
              if (issue.pull_request) continue;
              const labelNames = issue.labels.map(l => l.name);
              if (labelNames.includes('status/zombie')) continue;

              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                per_page: 10,
                sort: 'created',
                direction: 'desc',
              });

              if (comments.data.length === 0) continue;

              const doneComment = comments.data.find(c => {
                const body = c.body || '';
                return DONE_PATTERNS.some(p => p.test(body));
              });

              if (!doneComment) continue;

              const commentDate = new Date(doneComment.created_at);
              const elapsed = now - commentDate;
              if (elapsed < SEVEN_DAYS_MS) continue;

              const hasLaterComment = comments.data.some(c => {
                return new Date(c.created_at) > commentDate &&
                       !DONE_PATTERNS.some(p => p.test(c.body || ''));
              });
              if (hasLaterComment) continue;

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['status/zombie'],
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: '🧟 **Zombie detectado:** esta issue tem comentário indicando conclusão há mais de 7 dias, mas permanece aberta. Se está de fato concluída, feche-a. Se há pendência residual, remova a label `status/zombie` e documente o que falta.\n\n_Detectado automaticamente por zombie-issue-detector workflow._',
              });

              console.log(`Zombie: #${issue.number} "${issue.title}"`);
            }
