name: Needs Review Issue Detector
on:
  schedule:
    - cron: '0 9 * * 1'  # toda segunda às 9h UTC
  workflow_dispatch: {}

jobs:
  detect-needs-review:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            // Frases explícitas de conclusão. Evitar palavras soltas:
            // "não está pronto" contém "pronto", mas não é entrega.
            const DONE_PATTERNS = [
              /\b(done|shipped|deployed|merged)\b/i,
              /\b(fix applied|implementation complete)\b/i,
              /\b(feito|pronto|resolvido|conclu[ií]do|implementado|corrigido|entregue)\b/i,
              /\b(pode revisar|pronto para revis[aã]o|ready for review)\b/i,
            ];

            const NEGATION_PATTERNS = [
              /\b(n[aã]o|not|still|ainda)\b.{0,40}\b(done|feito|pronto|resolvido|conclu[ií]do|implementado|corrigido|entregue)\b/i,
              /\b(done|feito|pronto|resolvido|conclu[ií]do|implementado|corrigido|entregue)\b.{0,40}\b(n[aã]o|not|ainda)\b/i,
            ];

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              sort: 'updated',
              direction: 'desc',
              per_page: 100,
            });

            for (const issue of issues) {
              if (issue.pull_request) continue;
              const labelNames = issue.labels.map(l => l.name);
              if (labelNames.includes('status/needs-review')) continue;
              if (labelNames.includes('status/blocked')) continue;

              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                per_page: 3,
                sort: 'created',
                direction: 'desc',
              });

              if (comments.data.length === 0) continue;

              const lastComment = comments.data[0];
              const body = lastComment.body || '';
              const looksResolved = DONE_PATTERNS.some(pattern => pattern.test(body));
              const looksNegated = NEGATION_PATTERNS.some(pattern => pattern.test(body));

              if (looksResolved && !looksNegated) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: ['status/needs-review'],
                });
                console.log(`Needs review: #${issue.number} "${issue.title}"`);
              }
            }
